name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HOST_UID: "1001"
      HOST_GID: "1001"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare data directories
        run: make init

      - name: Validate compose and Python sources
        run: make check

      - name: Start stack
        run: make up

      - name: Run smoke test
        run: make smoke

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: make clean
